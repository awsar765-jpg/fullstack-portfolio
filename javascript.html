<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Demo - Awasar Gurung</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #003366; text-align: center; border-bottom: 3px solid #003366; padding-bottom: 15px; }
        .demo-section { margin: 35px 0; padding: 25px; background: #f9f9f9; border-radius: 8px; border-left: 5px solid #003366; }
        .back-link { color: #003366; text-decoration: none; font-weight: bold; }

        .quiz-question { font-size: 20px; margin-bottom: 20px; }
        .options button { 
            display: block; width: 100%; margin: 10px 0; 
            padding: 15px; border: none; border-radius: 8px; 
            background: #003366; color: white; cursor: pointer; 
        }
        .options button:hover { background: #0066cc; }
        .result { font-size: 24px; font-weight: bold; margin-top: 20px; text-align: center; }
        
        .counter-section { text-align: center; padding: 30px; background: #003366; color: white; border-radius: 10px; }
        .counter-display { font-size: 60px; font-weight: bold; margin: 20px 0; }
        .counter-btn { background: white; color: #003366; padding: 12px 25px; border: none; border-radius: 6px; margin: 0 8px; cursor: pointer; }

        .todo-input { display: flex; gap: 10px; margin-bottom: 15px; }
        .todo-input input { flex: 1; padding: 12px; border-radius: 6px; }
        .todo-list { list-style: none; padding: 0; }
        .todo-item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Home</a>
        <h1>JavaScript Demo - Awasar Gurung</h1>

        <!-- Counter -->
        <div class="demo-section">
            <h2>1. Click Counter</h2>
            <div class="counter-section">
                <div class="counter-display" id="counter">0</div>
                <button class="counter-btn" onclick="decrement()">−</button>
                <button class="counter-btn" onclick="resetCounter()">Reset</button>
                <button class="counter-btn" onclick="increment()">+</button>
            </div>
        </div>

        <!-- Simple Quiz -->
        <div class="demo-section">
            <h2>2. Simple Quiz App</h2>
            <div id="quiz">
                <p class="quiz-question" id="question">Loading question...</p>
                <div class="options" id="options"></div>
                <div class="result" id="result"></div>
            </div>
        </div>

        <!-- To-Do List -->
        <div class="demo-section">
            <h2>3. To-Do List</h2>
            <div class="todo-input">
                <input type="text" id="todoInput" placeholder="Add a new task...">
                <button onclick="addTodo()">Add</button>
            </div>
            <ul class="todo-list" id="todoList"></ul>
        </div>
    </div>

    <script>
        // Counter
        let count = 0;
        function increment() { count++; document.getElementById('counter').innerText = count; }
        function decrement() { count--; document.getElementById('counter').innerText = count; }
        function resetCounter() { count = 0; document.getElementById('counter').innerText = count; }

        // Simple Quiz
        const questions = [
            {
                q: "What does HTML stand for?",
                options: ["HyperText Markup Language", "High Transfer Machine Language", "Home Tool Markup Language"],
                answer: 0
            },
            {
                q: "Which language is used for styling web pages?",
                options: ["HTML", "CSS", "JavaScript"],
                answer: 1
            },
            {
                q: "Bootstrap is mainly used for?",
                options: ["Backend Development", "Responsive Design", "Database Management"],
                answer: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuestion() {
            if (currentQuestion >= questions.length) {
                document.getElementById('result').innerHTML = `Quiz Completed! Your score: ${score}/${questions.length}`;
                return;
            }
            const q = questions[currentQuestion];
            document.getElementById('question').innerText = q.q;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.innerText = option;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (selected === questions[currentQuestion].answer) {
                score++;
            }
            currentQuestion++;
            loadQuestion();
        }

        // Start the quiz
        loadQuestion();

        // To-Do List
        function addTodo() {
            let input = document.getElementById('todoInput');
            let task = input.value.trim();
            if (task === '') return;
            let li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `<span>${task}</span><button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>`;
            document.getElementById('todoList').appendChild(li);
            input.value = '';
        }
        document.getElementById('todoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTodo();
        });
    </script>
</body>
</html>
